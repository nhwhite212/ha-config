hvac_all_units_off:
  alias: HVAC all units off
  sequence:
  - alias: HVAC Turn OFF
    action: climate.turn_off
    target:
      device_id:
      - 29fed9bde00e178b4d562af9844c4076
      - c21675d20d60b519fca2f0d0ced4b60e
      - 6332765936817b92d9a1c30831262a37
      - 481da2fbbc840f9767d791656772d6b2
      - 455060edc3366ef192a70df5c947c401
    data: {}
  mode: single
  description: This script turns of all the HVAC zone controllers.
determine_presence:
  alias: Determine Presence
  sequence:
  - variables:
      phones_home: "{{ is_state('device_tracker.baysidea', 'home') or\n   is_state('device_tracker.baysideb',
        'home') }}\n"
  - if:
    - condition: template
      value_template: '{{ phones_home }}'
    then:
    - action: input_boolean.turn_on
      target:
        entity_id: input_boolean.someone_home
    else:
    - action: input_boolean.turn_off
      target:
        entity_id: input_boolean.someone_home
  mode: single
  description: ''
