- id: '4329'
  alias: Detect if Norman is home
  description: 'Sets an input_boolean or sends a notification when Norman arrives
    home.

    '
  trigger:
  - platform: state
    entity_id: person.norman
    from: not_home
    to: home
  condition: []
  action:
  - service: notify.mobile_app_normans_iphone
    data:
      title: Presence
      message: Norman has arrived home.
  - service: input_boolean.turn_on
    target:
      entity_id: input_boolean.someone_home
  mode: single
- id: '4328'
  alias: Determine if someone is home
  trigger:
  - platform: state
    entity_id:
    - person.norman
    - person.spouse
    - person.guest
  condition:
  - condition: template
    value_template: "{{ is_state('person.norman', 'home')\n    or is_state('person.guest',
      'home') }}\n"
  action:
  - service: input_boolean.turn_on
    target:
      entity_id: input_boolean.someone_home
  mode: single
