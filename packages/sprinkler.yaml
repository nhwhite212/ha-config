# Sprinkler Package
# Schedule: Mon/Wed/Fri, configurable start/end hour
# All thresholds configurable via input_number helpers on the dashboard
# No forecast condition - uses local sensors only

input_boolean:
  sprinkler_running:
    name: Sprinkler Running
    icon: mdi:sprinkler

  sprinkler_enabled:
    name: Sprinkler System Enabled
    icon: mdi:sprinkler-variant

input_number:
  sprinkler_moisture_threshold:
    name: Sprinkler moisture threshold
    min: 0
    max: 100
    step: 1
    unit_of_measurement: "%"
    icon: mdi:water-percent
    initial: 40

  sprinkler_wind_threshold:
    name: Sprinkler max wind speed
    min: 0
    max: 30
    step: 0.5
    unit_of_measurement: "mph"
    icon: mdi:weather-windy
    initial: 3

  sprinkler_rain_24h_threshold:
    name: Sprinkler max rain last 24h
    min: 0
    max: 2
    step: 0.05
    unit_of_measurement: "in"
    icon: mdi:weather-rainy
    initial: 0.25

  sprinkler_run_duration:
    name: Sprinkler run duration
    min: 1
    max: 60
    step: 1
    unit_of_measurement: "min"
    icon: mdi:timer
    initial: 30

  sprinkler_start_hour:
    name: Sprinkler start hour
    min: 0
    max: 23
    step: 1
    unit_of_measurement: "h"
    icon: mdi:clock-start
    initial: 5

  sprinkler_end_hour:
    name: Sprinkler end hour
    min: 0
    max: 23
    step: 1
    unit_of_measurement: "h"
    icon: mdi:clock-end
    initial: 8

  sprinkler_run_count:
    name: Sprinkler Run Count Today
    min: 0
    max: 10
    step: 1
    mode: box

script:
  sprinkler_emergency_stop:
    alias: "Sprinkler Emergency Stop"
    icon: mdi:stop-circle
    sequence:
      - service: switch.turn_off
        target:
          entity_id: switch.backyard_sprinkler
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.sprinkler_running
      - service: notify.mobile_app_baysidea
        data:
          title: Sprinkler NJ
          message: "Emergency stop triggered - sprinkler off"

automation: 
  - id: sprinkler_check_and_run
    alias: Sprinkler - Check conditions and run
    description: >
      Checks conditions Mon/Wed/Fri within configured hours and runs
      sprinkler for configured duration if needed, then rechecks.
    trigger:
      - platform: time_pattern
        minutes: "/30"
    condition:
      - condition: state
        entity_id: input_boolean.sprinkler_enabled
        state: "on"
      - condition: state
        entity_id: input_boolean.sprinkler_running
        state: "off"
      - condition: time
        weekday:
          - mon
          - wed
          - fri
      - condition: template
        value_template: >
          {{ now().hour >= states('input_number.sprinkler_start_hour') | int
             and now().hour < states('input_number.sprinkler_end_hour') | int }}
      - condition: template
        value_template: >
          {{ states('sensor.wind_speed_mph_2') | float(99)
             < states('input_number.sprinkler_wind_threshold') | float }}
      - condition: template
        value_template: >
          {{ states('sensor.soil_moisture_median') | float(99)
             < states('input_number.sprinkler_moisture_threshold') | float }}
      - condition: template
        value_template: >
          {{ states('sensor.rain_in_last_24_hours') | float(99)
             < states('input_number.sprinkler_rain_24h_threshold') | float }}
    action:
      - service: input_boolean.turn_on
        target:
          entity_id: input_boolean.sprinkler_running
      - service: switch.turn_on
        target:
          entity_id: switch.backyard_sprinkler
      - service: notify.mobile_app_baysidea
        data:
          title: Sprinkler NJ
          message: >
            Sprinkler started. Soil: {{ states('sensor.soil_moisture_median') }}%,
            Wind: {{ states('sensor.wind_speed_mph_2') }} mph,
            Rain 24hr: {{ states('sensor.rain_in_last_24_hours') }} in,
            Run time: {{ states('input_number.sprinkler_run_duration') | int }} min
      - delay:
          minutes: "{{ states('input_number.sprinkler_run_duration') | int }}"
      - service: switch.turn_off
        target:
          entity_id: switch.backyard_sprinkler
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.sprinkler_running
      - service: notify.mobile_app_baysidea
        data:
          title: Sprinkler NJ
          message: Sprinkler cycle complete. Will recheck conditions in 30 minutes.
    mode: single

  - id: sprinkler_test
    alias: Sprinkler - TEST (disable when done)
    description: >
      Test automation - uses same thresholds as real automation but
      checks every 2 minutes and runs for 1 minute.
      Enable in UI to test, disable when done.
    trigger:
      - platform: time_pattern
        minutes: "/2"
    condition:
      - condition: state
        entity_id: input_boolean.sprinkler_enabled
        state: "on"
      - condition: state
        entity_id: input_boolean.sprinkler_running
        state: "off"
      - condition: template
        value_template: >
          {{ states('sensor.wind_speed_mph_2') | float(99)
             < states('input_number.sprinkler_wind_threshold') | float }}
      - condition: template
        value_template: >
          {{ states('sensor.soil_moisture_median') | float(99)
             < states('input_number.sprinkler_moisture_threshold') | float }}
      - condition: template
        value_template: >
          {{ states('sensor.rain_in_last_24_hours') | float(99)
             < states('input_number.sprinkler_rain_24h_threshold') | float }}
    action:
      - service: input_boolean.turn_on
        target:
          entity_id: input_boolean.sprinkler_running
      - service: switch.turn_on
        target:
          entity_id: switch.backyard_sprinkler
      - service: notify.mobile_app_baysidea
        data:
          title: Sprinkler TEST
          message: >
            Test cycle started. Soil: {{ states('sensor.soil_moisture_median') }}%,
            Wind: {{ states('sensor.wind_speed_mph_2') }} mph,
            Rain 24hr: {{ states('sensor.rain_in_last_24_hours') }} in
      - delay:
          minutes: 1
      - service: switch.turn_off
        target:
          entity_id: switch.backyard_sprinkler
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.sprinkler_running
      - service: notify.mobile_app_baysidea
        data:
          title: Sprinkler TEST
          message: "Test cycle complete - sprinkler off"
    mode: single

  - id: sprinkler_watchdog
    alias: Sprinkler - Watchdog shutoff
    description: Emergency shutoff if sprinkler runs more than 90 minutes
    trigger:
      - platform: state
        entity_id: switch.backyard_sprinkler
        to: "on"
        for:
          minutes: 90
    action:
      - service: switch.turn_off
        target:
          entity_id: switch.backyard_sprinkler
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.sprinkler_running
      - service: notify.mobile_app_baysidea
        data:
          title: Sprinkler NJ - WARNING
          message: Sprinkler watchdog triggered - shutoff after 90 minutes!
    mode: single

  - id: sprinkler_wind_shutoff
    alias: Sprinkler - Emergency wind shutoff
    description: Turn off sprinkler if wind exceeds threshold while running
    trigger:
      - platform: numeric_state
        entity_id: sensor.wind_speed_mph_2
        above: input_number.sprinkler_wind_threshold
    condition:
      - condition: state
        entity_id: switch.backyard_sprinkler
        state: "on"
    action:
      - service: switch.turn_off
        target:
          entity_id: switch.backyard_sprinkler
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.sprinkler_running
      - service: notify.mobile_app_baysidea
        data:
          title: Sprinkler NJ - WARNING
          message: >
            Sprinkler stopped - wind speed {{ states('sensor.wind_speed_mph_2') }} mph
            exceeded threshold of {{ states('input_number.sprinkler_wind_threshold') }} mph
    mode: single

  - id: soil_sensor_offline
    alias: Soil Sensor Offline Alert
    description: Notify when a soil sensor goes unavailable for more than 1 hour
    trigger:
      - platform: state
        entity_id:
          # - sensor.soil_moisture_nj_a7
          - sensor.soil_moisture_nj_2_c2
          # - sensor.soil_moisture_nj_3_89
          - sensor.soil_moisture_nj_4_a3
          - sensor.soil_moisture_nj_5_2f
          - sensor.soil_moisture_nj_6_f2_2
          - sensor.soil_moisture_nj_7_46
          - sensor.soil_moisture_nj_8_00
          - sensor.soil_moisture_nj_9_f7
        to: unavailable
        for:
          hours: 1
    action:
      - service: notify.mobile_app_baysidea
        data:
          title: Soil Sensor Offline
          message: "{{ trigger.to_state.name }} has been unavailable for 1 hour"
    mode: parallel

  - id: turn off sprinkler on ha startup
    alias: force sprinkler plug off on startup
    description: make sure sprinkler is turned of on HA startup
    trigger:
      - platform: homeassistant
        event: start
    action:
      - delay: "00:00:30"
      - service: switch.turn_off
        target:
          entity_id: switch.backyard_sprinkler
