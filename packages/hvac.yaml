  kumo_all_units_off:
    alias: Kumo All Units Off
    sequence:
      - action: climate.turn_off
        target:
          entity_id:
            - climate.living_room
            - climate.dining_room
            - climate.bedroom
            - climate.master_bedroom
            - climate.home_office
    mode: single

automation:
  - alias: HVAC Season Control
    description: Sets HVAC mode and temperatures based on outside temperature, presence and time
    triggers:
      - entity_id:
          - device_tracker.baysidea
          - device_tracker.baysideb
        trigger: state
      - entity_id: sensor.outside_temperature_deck
        above: 0
        trigger: numeric_state
      - trigger: time
        at: input_datetime.hvac_schedule_start
      - trigger: time
        at: input_datetime.hvac_schedule_end
      - minutes: /30
        trigger: time_pattern
    conditions: []
    actions:
      - action: script.turn_on
        target:
          entity_id: script.determine_presence
      - delay:
          seconds: 5
      - variables:
          outside_temp: "{{ states('sensor.outside_temperature_deck') | float }}"
          cool_threshold: "{{ states('input_number.hvac_cool_threshold') | float }}"
          heat_threshold: "{{ states('input_number.hvac_heat_threshold') | float }}"
          away_cool_threshold: "{{ states('input_number.hvac_away_cool_threshold') | float }}"
          away_heat_threshold: "{{ states('input_number.hvac_away_heat_threshold') | float }}"
          away_cool_setpoint: "{{ states('input_number.hvac_away_cool_setpoint') | float }}"
          away_heat_setpoint: "{{ states('input_number.hvac_away_heat_setpoint') | float }}"
          is_day: >
            {% set start = states('input_datetime.hvac_schedule_start') %}
            {% set end = states('input_datetime.hvac_schedule_end') %}
            {% set now_time = now().strftime('%H:%M:%S') %}
            {{ start <= now_time <= end }}
          someone_home: "{{ is_state('input_boolean.someone_home', 'on') }}"
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ not someone_home and outside_temp < away_heat_threshold }}"
            sequence:
              - action: climate.set_hvac_mode
                target:
                  entity_id:
                    - climate.living_room
                    - climate.dining_room
                    - climate.bedroom
                    - climate.master_bedroom
                    - climate.home_office
                data:
                  hvac_mode: heat
              - action: climate.set_temperature
                target:
                  entity_id:
                    - climate.living_room
                    - climate.dining_room
                    - climate.bedroom
                    - climate.master_bedroom
                    - climate.home_office
                data:
                  temperature: "{{ away_heat_setpoint }}"
          - conditions:
              - condition: template
                value_template: "{{ not someone_home and outside_temp > away_cool_threshold }}"
            sequence:
              - action: climate.set_hvac_mode
                target:
                  entity_id:
                    - climate.living_room
                    - climate.dining_room
                    - climate.bedroom
                    - climate.master_bedroom
                    - climate.home_office
                data:
                  hvac_mode: cool
              - action: climate.set_temperature
                target:
                  entity_id:
                    - climate.living_room
                    - climate.dining_room
                    - climate.bedroom
                    - climate.master_bedroom
                    - climate.home_office
                data:
                  temperature: "{{ away_cool_setpoint }}"
          - conditions:
              - condition: template
                value_template: "{{ not someone_home }}"
            sequence:
              - action: climate.turn_off
                target:
                  entity_id:
                    - climate.living_room
                    - climate.dining_room
                    - climate.bedroom
                    - climate.master_bedroom
                    - climate.home_office
          - conditions:
              - condition: template
                value_template: "{{ someone_home and outside_temp < heat_threshold and is_day }}"
            sequence:
              - action: climate.set_hvac_mode
                target:
                  entity_id:
                    - climate.living_room
                    - climate.dining_room
                    - climate.bedroom
                    - climate.master_bedroom
                    - climate.home_office
                data:
                  hvac_mode: heat
              - action: climate.set_temperature
                target:
                  entity_id: climate.living_room
                data:
                  temperature: "{{ states('input_number.hvac_day_heat_living_room') | float }}"
              - action: climate.set_temperature
                target:
                  entity_id: climate.dining_room
                data:
                  temperature: "{{ states('input_number.hvac_day_heat_dining_room') | float }}"
              - action: climate.set_temperature
                target:
                  entity_id: climate.home_office
                data:
                  temperature: "{{ states('input_number.hvac_day_heat_home_office') | float }}"
              - action: climate.set_temperature
                target:
                  entity_id: climate.bedroom
                data:
                  temperature: "{{ states('input_number.hvac_day_heat_bedroom') | float }}"
              - action: climate.set_temperature
                target:
                  entity_id: climate.master_bedroom
                data:
                  temperature: "{{ states('input_number.hvac_day_heat_master_bedroom') | float }}"
          - conditions:
              - condition: template
                value_template: "{{ someone_home and outside_temp < heat_threshold and not is_day }}"
            sequence:
              - action: climate.set_hvac_mode
                target:
                  entity_id:
                    - climate.living_room
                    - climate.dining_room
                    - climate.bedroom
                    - climate.master_bedroom
                    - climate.home_office
                data:
                  hvac_mode: heat
              - action: climate.set_temperature
                target:
                  entity_id: climate.living_room
                data:
                  temperature: "{{ states('input_number.hvac_night_heat_living_room') | float }}"
              - action: climate.set_temperature
                target:
                  entity_id: climate.dining_room
                data:
                  temperature: "{{ states('input_number.hvac_night_heat_dining_room') | float }}"
              - action: climate.set_temperature
                target:
                  entity_id: climate.home_office
                data:
                  temperature: "{{ states('input_number.hvac_night_heat_home_office') | float }}"
              - action: climate.set_temperature
                target:
                  entity_id: climate.bedroom
                data:
                  temperature: "{{ states('input_number.hvac_night_heat_bedroom') | float }}"
              - action: climate.set_temperature
                target:
                  entity_id: climate.master_bedroom
                data:
                  temperature: "{{ states('input_number.hvac_night_heat_master_bedroom') | float }}"
          - conditions:
              - condition: template
                value_template: "{{ someone_home and outside_temp > cool_threshold and is_day }}"
            sequence:
              - action: climate.set_hvac_mode
                target:
                  entity_id:
                    - climate.living_room
                    - climate.dining_room
                    - climate.bedroom
                    - climate.master_bedroom
                    - climate.home_office
                data:
                  hvac_mode: cool
              - action: climate.set_temperature
                target:
                  entity_id: climate.living_room
                data:
                  temperature: "{{ states('input_number.hvac_day_cool_living_room') | float }}"
              - action: climate.set_temperature
                target:
                  entity_id: climate.dining_room
                data:
                  temperature: "{{ states('input_number.hvac_day_cool_dining_room') | float }}"
              - action: climate.set_temperature
                target:
                  entity_id: climate.home_office
                data:
                  temperature: "{{ states('input_number.hvac_day_cool_home_office') | float }}"
              - action: climate.set_temperature
                target:
                  entity_id: climate.bedroom
                data:
                  temperature: "{{ states('input_number.hvac_day_cool_bedroom') | float }}"
              - action: climate.set_temperature
                target:
                  entity_id: climate.master_bedroom
                data:
                  temperature: "{{ states('input_number.hvac_day_cool_master_bedroom') | float }}"
          - conditions:
              - condition: template
                value_template: "{{ someone_home and outside_temp > cool_threshold and not is_day }}"
            sequence:
              - action: climate.set_hvac_mode
                target:
                  entity_id:
                    - climate.living_room
                    - climate.dining_room
                    - climate.bedroom
                    - climate.master_bedroom
                    - climate.home_office
                data:
                  hvac_mode: cool
              - action: climate.set_temperature
                target:
                  entity_id: climate.living_room
                data:
                  temperature: "{{ states('input_number.hvac_night_cool_living_room') | float }}"
              - action: climate.set_temperature
                target:
                  entity_id: climate.dining_room
                data:
                  temperature: "{{ states('input_number.hvac_night_cool_dining_room') | float }}"
              - action: climate.set_temperature
                target:
                  entity_id: climate.home_office
                data:
                  temperature: "{{ states('input_number.hvac_night_cool_home_office') | float }}"
              - action: climate.set_temperature
                target:
                  entity_id: climate.bedroom
                data:
                  temperature: "{{ states('input_number.hvac_night_cool_bedroom') | float }}"
              - action: climate.set_temperature
                target:
                  entity_id: climate.master_bedroom
                data:
                  temperature: "{{ states('input_number.hvac_night_cool_master_bedroom') | float }}"
    mode: single
    