script:
  determine_presence:
    alias: Determine Presence
    sequence:
      - variables:
          phones_home: >
            {{ is_state('device_tracker.baysidea', 'home') or
               is_state('device_tracker.baysideb', 'home') }}
      - if:
          - condition: template
            value_template: "{{ phones_home }}"
        then:
          - action: input_boolean.turn_on
            target:
              entity_id: input_boolean.someone_home
        else:
          - action: input_boolean.turn_off
            target:
              entity_id: input_boolean.someone_home
    mode: single

  hvac_set_defaults:
    alias: HVAC Set Default Values
    sequence:
      - action: input_number.set_value
        target:
          entity_id: input_number.hvac_heat_threshold
        data:
          value: 55
      - action: input_number.set_value
        target:
          entity_id: input_number.hvac_cool_threshold
        data:
          value: 75
      - action: input_number.set_value
        target:
          entity_id: input_number.hvac_away_heat_threshold
        data:
          value: 45
      - action: input_number.set_value
        target:
          entity_id: input_number.hvac_away_cool_threshold
        data:
          value: 85
      - action: input_number.set_value
        target:
          entity_id: input_number.hvac_away_heat_setpoint
        data:
          value: 62
      - action: input_number.set_value
        target:
          entity_id: input_number.hvac_away_cool_setpoint
        data:
          value: 85
      - action: input_number.set_value
        target:
          entity_id: input_number.hvac_day_heat_living_room
        data:
          value: 72
      - action: input_number.set_value
        target:
          entity_id: input_number.hvac_day_heat_dining_room
        data:
